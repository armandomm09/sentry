# backend/.air.toml — live reload config for Go backend
root = "."
tmp_dir = "tmp"

[build]
  cmd        = "go build -o ./tmp/backend ."
  bin        = "./tmp/backend"
  include_ext = ["go"]
  exclude_dir = ["tmp", "data"]
  delay      = 500

[log]
  time = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true
